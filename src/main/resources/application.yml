server:
  port: ${PORT:9192}
  # ssl:
  #   enabled: false
  #   key-store: classpath:keystore-new.p12
  #   key-store-password: BoogyMan
  #   key-store-type: PKCS12
  #   key-alias: springboot

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update
      format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
      file-size-threshold: 2KB
  jackson:
    date-format: yyyy-MM-dd
    serialization:
      write-dates-as-timestamps: false
  mail:                                      
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true  
razorpay:
  key-id: ${RAZORPAY_ID}
  key-secret: ${RAZORPAY_PASSWORD}
logging:
  level:
    org.hibernate.SQL: DEBUG									
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 86400000    # 24 hours in milliseconds 
